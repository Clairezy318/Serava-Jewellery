<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serava Jewels</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <script src="js/bootstrap.js"></script>
</head>
<body class="bg-dark">
    <section class="row justify-content--center">
        <div class="col-md-6">
            <div class="text-center text-white m-5">
                <h2>Serava Jewelry</h2>
                <p>Gift yourself and loved ones</p>
                <div>
                    <img src="images/4carat diamind pink ring.jpg" alt="representation photo" height="100px" width="95px" class="img-fluid mt-4" style="width: 360px; border-radius: 300px;">
                </div>

            </div>

        </div>
        <div class="col-md-6 p-3">
            <div class="m-3">
                <div class="card shadow">
                    <div class="card-header text-center bg-success text-white">
                        <h4>Create an account </h4>

                    </div>
                    <div class="card-body">
                        <form>
                            <div class="mb-3">
                                <label for="Full name"></label>
                                <br>
                                <input type="text" placeholder="Enter full name" class="form-control">

                            </div>
                            <div class="mb-3">
                                <label for="">Email </label>
                                <br>
                                <input type="email" placeholder="Enter your email" class="form-control">

                            </div>
                            <div class="mb-3">
                                <label for="">Phone number </label>
                                <br>
                                <input type="tel" placeholder="Enter your phone number" class="form-control">

                            </div>
                            <div class="mb-3">
                                <label for="">Password </label>
                                <br>
                                <input type="password" placeholder="Enter Password" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label for="">Confirm password </label>
                                <br>
                                <input type="password" placeholder="Confirm password" class="form-control">
                            </div>
                            <div class="d-grid">
                                <button class="btn btn-success">Register</button>

                            </div>
                        </form>
                        
                        <p class="text-center mt-3">Already have an Account? <a href="signin.html">Sign In</a></p>

                        <a href="index.html" class="text-end">Back Home</a>

                    </div>

                </div>
            </div>
        </div>


    </section>
    
</body>
</html>
