<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serava Jewelry Designs</title>

    <!-- linking bootstrap files -->
     <!-- css -->
    <link rel="stylesheet" href="/css/bootstrap.css">
    <!-- script -->
    <script src="/js/bootstrap.js"></script>
</head>
<body class="bg-dark">
    
    <!-- sign up page -->
    <!-- name of the company -->
     <section class="row justify-content--center">
        <!-- columns 2 -->
         <div class="col-md-6">
            <!-- name of our company,image, -->
             <div class="text-center text-white m-5">
                <h2>Serava Jewelry</h2>
                <p>Gift Yourself and Loved Ones</p>
                <div>
                    <img src="/images/4carat diamind pink ring.jpg" alt="representation photo" height="65px" width="60px" class="img-fluid mt-4" style="width: 260px; border-radius: 200px;">
                </div>
             </div>
         </div>
         <div class="col-md-6 p-3">
            <!-- sign up section -->
             <div class="m-3"> 
                <!-- card - contains our sign up input fields -->
                 <!-- username,password,email,telephone number -->
                  <div class="card shadow">
                    <div class="card-header text-center bg-success text-white">
                        <h4>Create Account</h4>
                    </div>
                    <!-- card body -->
                     <div class="card-body">
                      <!-- a form carrying the input fields -->
                       <form>
                        <div class="mb-3">
                            <label for="">Full Name</label>
                            <br>
                            <input type="text" placeholder=" Enter full name" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="">Email</label>
                            <br>
                            <input type="email" placeholder="Enter Your Email" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="">Phone</label>
                            <br>
                            <input type="tel" placeholder="Enter phone number" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="">Password</label>
                            <br>
                            <input type="password" placeholder="Enter Password" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="">Confirm password</label>
                            <br>
                            <input type="password" placeholder="Confirm password" class="form-control">
                        </div>
                        <!-- button -->
                         <div class="d-grid">
                            <button class="btn btn-success">Register</button>
                         </div>
                       </form>

                       <p class="text-center mt-3">Already have an Account? <a href="signin.html">Sign In</a></p>

                       <a href="index.html" class="text-end">Back Home</a>
                     </div>
                  </div>
             </div>
         </div>
     </section>
</body>
</html>
